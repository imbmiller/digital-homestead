name: Agent Feedback
description: Report a problem an agent encountered while setting up a module
title: "[feedback] <module>: <short description>"
labels: ["agent-feedback"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module were you setting up?
      options:
        - docker
        - portainer
        - tailscale
        - surfshark
        - proxy-stack
        - jellyfin
        - media-stack
        - immich
        - homebase-budget
        - mission-control-dashboard
        - other
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: AI model used
      description: The model that was running the installation (e.g. claude-sonnet-4-6, gpt-4o, gemini-2.5-pro)
      placeholder: claude-sonnet-4-6
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date
      description: Date the issue was encountered (YYYY-MM-DD)
      placeholder: "2026-06-11"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, hardware, Docker version, and any other relevant context
      placeholder: |
        OS: Ubuntu 24.04
        Hardware: Intel i9-9500, 32GB RAM
        Docker: 29.2.1
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: Issue description
      description: What went wrong? Include the exact step in AGENT.md where it failed, error messages, and what the agent tried.
    validations:
      required: true

  - type: textarea
    id: resolution
    attributes:
      label: Resolution (if found)
      description: What did the agent do to work around or fix the problem? If unresolved, leave blank.
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirm
      options:
        - label: I have checked that this issue is not already reported
          required: true
