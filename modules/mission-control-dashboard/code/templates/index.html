<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .bar { transition: width 0.7s ease; }
  </style>
</head>
<body class="bg-slate-50 text-gray-800 antialiased" x-data="dashboard()" x-init="init()" x-cloak>

  <!-- Header -->
  <header class="sticky top-0 z-10 bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-2.5 h-2.5 rounded-full flex-shrink-0"
             :class="connected ? 'bg-green-400' : 'bg-red-300 animate-pulse'"></div>
        <h1 class="font-semibold text-gray-900 truncate"
            x-text="stats.system?.hostname ?? 'Mission Control'"></h1>
        <span class="text-sm text-gray-400 hidden sm:block">
          up <span x-text="stats.system?.uptime ?? '—'"></span>
        </span>
      </div>
      <div class="flex items-center gap-5 text-sm flex-shrink-0">
        <span class="text-gray-500 hidden sm:block" x-text="stats.tailscale?.ip ?? ''"></span>
        <span class="text-gray-400 tabular-nums font-mono" x-text="clock"></span>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-6 space-y-5">

    <!-- Hardware -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider">CPU</p>
        <p class="text-4xl font-light text-gray-800 mt-2 tabular-nums"
           x-text="stats.system?.cpu_pct != null ? stats.system.cpu_pct + '%' : '—'"></p>
        <div class="mt-3 h-1 bg-gray-100 rounded-full overflow-hidden">
          <div class="h-1 rounded-full bar"
               :class="barColor(stats.system?.cpu_pct)"
               :style="`width:${stats.system?.cpu_pct ?? 0}%`"></div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider">RAM</p>
        <p class="text-4xl font-light text-gray-800 mt-2 tabular-nums"
           x-text="stats.system?.ram_pct != null ? stats.system.ram_pct + '%' : '—'"></p>
        <p class="text-xs text-gray-400 mt-0.5"
           x-text="stats.system ? `${stats.system.ram_used_gb} / ${stats.system.ram_total_gb} GB` : ''"></p>
        <div class="mt-2 h-1 bg-gray-100 rounded-full overflow-hidden">
          <div class="h-1 rounded-full bar"
               :class="barColor(stats.system?.ram_pct)"
               :style="`width:${stats.system?.ram_pct ?? 0}%`"></div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider">CPU Temp</p>
        <p class="text-4xl font-light text-gray-800 mt-2 tabular-nums"
           x-text="stats.system?.cpu_temp != null ? Math.round(stats.system.cpu_temp) + '°' : '—'"></p>
        <p class="text-xs text-gray-400 mt-0.5">Celsius</p>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider">GPU Temp</p>
        <p class="text-4xl font-light text-gray-800 mt-2 tabular-nums"
           x-text="stats.system?.gpu_temp != null ? Math.round(stats.system.gpu_temp) + '°' : '—'"></p>
        <p class="text-xs text-gray-400 mt-0.5">Radeon R7 360</p>
      </div>

    </div>

    <!-- Storage -->
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
      <h2 class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-5">Storage</h2>
      <div class="space-y-5">
        <template x-for="disk in (stats.storage ?? [])" :key="disk.path">
          <div>
            <div class="flex justify-between items-baseline mb-1.5">
              <span class="text-sm font-medium text-gray-700" x-text="disk.label"></span>
              <span class="text-xs text-gray-400"
                    x-text="disk.error ? 'unavailable' : `${disk.used_gb} GB / ${disk.total_gb} GB`"></span>
            </div>
            <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
              <div class="h-1.5 rounded-full bar"
                   :class="barColor(disk.pct)"
                   :style="`width:${disk.error ? 0 : (disk.pct ?? 0)}%`"></div>
            </div>
            <p class="text-xs text-gray-400 mt-1"
               x-text="disk.error ? disk.error : `${disk.free_gb} GB free · ${disk.pct}%`"></p>
          </div>
        </template>
      </div>
    </div>

    <!-- Containers -->
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
      <h2 class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Containers</h2>
      <template x-if="(stats.containers ?? []).length === 0">
        <p class="text-sm text-gray-400">No containers found</p>
      </template>
      <div class="space-y-5">
        <template x-for="group in containerGroups()" :key="group.name">
          <div>
            <p class="text-xs font-medium text-gray-300 uppercase tracking-wider mb-2.5"
               x-text="group.name"></p>
            <div class="flex flex-wrap gap-2">
              <template x-for="c in group.containers" :key="c.name">
                <div
                  @click="c.url && window.open(c.url, '_blank')"
                  :class="{
                    'cursor-pointer hover:border-blue-300 hover:bg-blue-50 border-gray-200': c.url,
                    'cursor-default bg-gray-50 border-gray-100': !c.url,
                  }"
                  class="flex items-center gap-2 px-3 py-1.5 rounded-lg border text-sm transition-colors select-none"
                  :title="c.status"
                >
                  <div class="w-2 h-2 rounded-full flex-shrink-0"
                       :class="{
                         'bg-green-400':  c.status === 'running',
                         'bg-amber-400':  c.status === 'paused' || c.status === 'restarting',
                         'bg-red-400':    c.status === 'exited' || c.status === 'dead',
                         'bg-gray-300':   !['running','paused','exited','dead','restarting'].includes(c.status),
                       }"></div>
                  <span class="text-gray-700" x-text="c.label"></span>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Status row -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">

      <!-- Tailscale / VPN -->
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">Tailscale</p>
        <div class="flex items-center gap-2 mb-1">
          <div class="w-2 h-2 rounded-full"
               :class="stats.tailscale?.connected ? 'bg-green-400' : 'bg-gray-300'"></div>
          <span class="text-sm text-gray-700"
                x-text="stats.tailscale?.connected ? 'Connected' : 'Disconnected'"></span>
        </div>
        <p class="text-xs text-gray-400"
           x-text="stats.tailscale?.peer_count != null ? `${stats.tailscale.peer_count} peers` : ''"></p>
      </div>

      <!-- Torrent VPN (gluetun) -->
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">Torrent VPN</p>
        <div class="flex items-center gap-2 mb-1">
          <div class="w-2 h-2 rounded-full"
               :class="stats.vpn?.connected ? 'bg-green-400' : 'bg-red-400'"></div>
          <span class="text-sm text-gray-700"
                x-text="stats.vpn?.connected ? 'Protected' : 'Unprotected'"></span>
        </div>
        <p class="text-xs text-gray-500 tabular-nums" x-text="stats.vpn?.public_ip ?? ''"></p>
        <p class="text-xs text-gray-400 truncate" x-text="stats.vpn?.location ?? ''"></p>
      </div>

      <!-- Nightly Backup -->
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">Nightly Backup</p>
        <div class="flex items-center gap-2 mb-1">
          <div class="w-2 h-2 rounded-full"
               :class="{
                 'bg-green-400': stats.backup?.status === 'ok',
                 'bg-red-400':   stats.backup?.status === 'error',
                 'bg-gray-300':  !['ok','error'].includes(stats.backup?.status ?? ''),
               }"></div>
          <span class="text-sm text-gray-700"
                x-text="({'ok':'OK','error':'Error','no_log':'No log','unknown':'Unknown','empty':'Empty'})[stats.backup?.status] ?? '—'"></span>
        </div>
        <p class="text-xs text-gray-400 truncate" x-text="stats.backup?.last_line ?? ''"></p>
      </div>

      <!-- AdGuard -->
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">AdGuard DNS</p>
        <template x-if="stats.adguard?.configured && !stats.adguard?.error">
          <div>
            <p class="text-2xl font-light text-gray-800 tabular-nums"
               x-text="(stats.adguard?.total ?? 0).toLocaleString()"></p>
            <p class="text-xs text-gray-400 mt-0.5"
               x-text="`${stats.adguard?.blocked_pct ?? 0}% blocked today`"></p>
          </div>
        </template>
        <template x-if="stats.adguard?.error">
          <p class="text-xs text-red-400" x-text="stats.adguard.error"></p>
        </template>
        <template x-if="stats.adguard && !stats.adguard.configured">
          <p class="text-sm text-gray-400">Set creds in .env</p>
        </template>
      </div>

    </div>

    <!-- qBittorrent + Updates row -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

      <!-- qBittorrent -->
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">qBittorrent</p>
        <template x-if="stats.qbit?.configured && !stats.qbit?.error">
          <div class="flex items-baseline gap-4">
            <div>
              <span class="text-2xl font-light text-gray-800 tabular-nums"
                    x-text="stats.qbit?.active_count ?? 0"></span>
              <span class="text-sm text-gray-400 ml-1">active</span>
            </div>
            <p class="text-sm text-gray-500">
              ↓ <span class="tabular-nums" x-text="formatSpeed(stats.qbit?.dl_speed ?? 0)"></span>
              &nbsp;·&nbsp;
              ↑ <span class="tabular-nums" x-text="formatSpeed(stats.qbit?.ul_speed ?? 0)"></span>
            </p>
          </div>
        </template>
        <template x-if="stats.qbit?.error">
          <p class="text-xs text-red-400" x-text="stats.qbit.error"></p>
        </template>
        <template x-if="stats.qbit && !stats.qbit.configured">
          <p class="text-sm text-gray-400">Set creds in .env</p>
        </template>
      </div>

      <!-- System Updates -->
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">Last System Update</p>
        <p class="text-sm text-gray-600 font-mono truncate" x-text="stats.updates?.last_line ?? '—'"></p>
      </div>

    </div>

    <p class="text-xs text-gray-300 text-center pb-2">
      refreshed <span x-text="lastUpdated"></span>
    </p>

  </main>

  <script>
    function dashboard() {
      return {
        stats: {},
        clock: '',
        lastUpdated: '—',
        connected: false,

        init() {
          this.tick();
          setInterval(() => this.tick(), 1000);

          const es = new EventSource('/stream');
          es.onmessage = (e) => {
            try {
              this.stats = JSON.parse(e.data);
              this.connected = true;
              this.lastUpdated = new Date().toLocaleTimeString();
            } catch (_) {}
          };
          es.onerror = () => { this.connected = false; };
        },

        tick() {
          this.clock = new Date().toLocaleTimeString([], {
            hour: '2-digit', minute: '2-digit', second: '2-digit',
          });
        },

        containerGroups() {
          const ORDER = ['Media', 'Immich', 'System', 'Other'];
          const groups = {};
          for (const c of (this.stats.containers ?? [])) {
            const g = c.group ?? 'Other';
            (groups[g] = groups[g] ?? []).push(c);
          }
          return ORDER.filter(g => groups[g]).map(g => ({ name: g, containers: groups[g] }));
        },

        barColor(pct) {
          if (pct == null) return 'bg-blue-300';
          if (pct >= 85) return 'bg-red-400';
          if (pct >= 70) return 'bg-amber-400';
          return 'bg-blue-400';
        },

        formatSpeed(bps) {
          if (bps >= 1e6) return (bps / 1e6).toFixed(1) + ' MB/s';
          if (bps >= 1e3) return Math.round(bps / 1e3) + ' KB/s';
          return bps + ' B/s';
        },
      };
    }
  </script>

</body>
</html>
